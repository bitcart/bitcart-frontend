name: Upload locales

on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  upload-locales:
    name: upload-locales-${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [landing, directory]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: bitcart/bitcart-actions/actions/setup-node@master

      - name: Set up Python
        uses: bitcart/bitcart-actions/actions/setup-python@master
        with:
          cache-dependency-glob: ""

      - name: Install just
        run: uv pip install rust-just

      - name: Build packages
        run: just build-packages

      - name: Extract locales
        run: pnpm ${{ matrix.app }} locales:extract

      - name: Install Transifex CLI
        run: scripts/install-tx-client.sh

      - name: Push source locale to Transifex
        working-directory: apps/${{ matrix.app }}
        run: tx push -s
        env:
          TX_TOKEN: ${{ secrets.TX_TOKEN }} # zizmor: ignore[secrets-outside-env] # triggered only by push to master
