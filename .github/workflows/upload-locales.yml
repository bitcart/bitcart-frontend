name: Upload locales

on:
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow_ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  upload-locales:
    name: upload-locales
    runs-on: ubuntu-latest
    environment: transifex
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: bitcart/bitcart-actions/actions/setup-node@master

      - name: Set up Python
        uses: bitcart/bitcart-actions/actions/setup-python@master
        with:
          cache-dependency-glob: ""

      - name: Install just
        run: uv pip install rust-just

      - name: Build packages
        run: just build-packages

      - name: Extract locales
        run: just locales-extract

      - name: Install Transifex CLI
        run: scripts/install-tx-client.sh

      - name: Push source locales to Transifex
        run: |
          for app in apps/*/; do
            if [ -d "$app.tx" ]; then
              cd "$app" && tx push -s && cd ../..
            fi
          done
        env:
          TX_TOKEN: ${{ secrets.TX_TOKEN }}
