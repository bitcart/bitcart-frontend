name: CI

on:
  push:
    branches:
      - master
  pull_request:

concurrency:
  group: ${{ github.workflow_ref }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: lint
    uses: bitcart/bitcart-actions/.github/workflows/lint.yml@master
    with:
      setup-node: true
      verbose: true
      install-dependencies: |
        uv pip install prek rust-just
      cache-dependency-glob: ""
      nx-cache: true

  zizmor:
    name: zizmor
    uses: bitcart/bitcart-actions/.github/workflows/zizmor-audit.yml@master
    permissions:
      contents: read
      security-events: write # needed for github advanced security

  e2e:
    name: e2e
    needs: [lint, zizmor]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: bitcart/bitcart-actions/actions/setup-node@master

      - name: Restore Nx cache
        id: nx-cache-restore
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .nx
          key: v1-nx-${{ github.ref_name }}-${{ hashFiles('nx.json') }}
          restore-keys: |
            v1-nx-${{ github.ref_name }}-

      - name: Set up Python
        uses: bitcart/bitcart-actions/actions/setup-python@master
        with:
          cache-dependency-glob: ""

      - name: Install just
        run: uv pip install rust-just

      - run: just e2e-setup

      - run: just e2e

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: e2e-results
          path: |
            apps/*/e2e/playwright-report/
            apps/*/e2e/screenshots/
          retention-days: 1

      - name: Save Nx cache
        if: always()
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .nx
          key: ${{ steps.nx-cache-restore.outputs.cache-primary-key }}

  upload-e2e-artifacts:
    name: upload-${{ matrix.app }}-e2e-artifacts
    needs: e2e
    if: ${{ !cancelled() && needs.e2e.result != 'skipped' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [landing, directory]
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: e2e-results

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-${{ matrix.app }}
          path: ${{ matrix.app }}/e2e/playwright-report/
          retention-days: 14

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: screenshots-${{ matrix.app }}
          path: ${{ matrix.app }}/e2e/screenshots/
          retention-days: 14
