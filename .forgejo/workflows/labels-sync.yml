name: Sync labels

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  sync-labels:
    name: sync-labels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Sync labels from bitcart/.github
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          API_URL: ${{ github.server_url }}/api/v1/repos/${{ github.repository }}/labels
        run: .forgejo/scripts/sync-labels.sh
